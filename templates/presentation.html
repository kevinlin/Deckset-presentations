<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ presentation.info.title }}</title>
    <!-- Favicon and Apple Touch Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="{{ asset_path_prefix }}assets/favicon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ asset_path_prefix }}assets/favicon.png">
    <link rel="apple-touch-icon" href="{{ asset_path_prefix }}assets/favicon.png">
    <link rel="shortcut icon" href="{{ asset_path_prefix }}assets/favicon.png">
    <!-- Additional meta tags for favicon support -->
    <meta name="msapplication-TileColor" content="#2563eb">
    <meta name="theme-color" content="#2563eb">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ asset_path_prefix }}assets/css/homepage.css">
    <link rel="stylesheet" href="{{ asset_path_prefix }}slide_styles.css">
    {% for link in theme_links %}{{ link }}
    {% endfor %}
    <link rel="stylesheet" href="{{ asset_path_prefix }}assets/vendor/highlight/default.min.css">
    <script id="MathJax-script" async src="{{ asset_path_prefix }}assets/vendor/mathjax/tex-mml-chtml.js"></script>
    {% if analytics_enabled %}
    <script async src="https://www.googletagmanager.com/gtag/js?id={{ analytics_measurement_id }}"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);} 
      {% if do_not_track %}
      gtag('consent','default',{'analytics_storage':'denied'});
      {% endif %}
      gtag('js', new Date());
      gtag('config', '{{ analytics_measurement_id }}');
    </script>
    {% endif %}
</head>
<body>
    <!-- Navigation Header -->
    <header class="site-header shadow-sm sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8" aria-label="Main navigation">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="{{ asset_path_prefix }}index.html" class="site-title text-xl font-semibold flex items-center">
                        <img src="{{ asset_path_prefix }}assets/deckset-icon.png" alt="Deckset" class="h-8 w-8 mr-2">
                        <span>Deckset Presentations</span>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <select id="theme-select" class="site-nav-link" aria-label="Theme"></select>
                    <a href="https://www.deckset.com/" target="_blank" rel="noopener noreferrer"
                       class="site-nav-link px-3 py-2 rounded-md text-sm font-medium">Deckset</a>
                    <a href="{{ asset_path_prefix }}index.html" 
                       class="site-nav-link px-3 py-2 rounded-md text-sm font-medium">
                        ← Back to Home
                    </a>
                </div>
            </div>
        </nav>
    </header>
    
    <div class="presentation-container" data-presentation-title="{{ presentation.info.title }}">
        <div class="slides-container">
            {{ slides_html | safe }}
        </div>
        
        <!-- Navigation -->
        <div class="navigation">
            <button id="prev-slide" class="nav-button">Previous</button>
            <span id="slide-counter">1 / {{ total_slides }}</span>
            <button id="next-slide" class="nav-button">Next</button>
            <button id="toggle-notes" class="nav-button">Notes</button>
        </div>
    </div>
    
    <!-- Enhanced JavaScript -->
    <script src="{{ asset_path_prefix }}assets/vendor/highlight/highlight.min.js"></script>
    <script src="{{ asset_path_prefix }}assets/js/slide-viewer.js"></script>
    
    <!-- MathJax Configuration -->
    <script>
        {{ mathjax_config | safe }}
    </script>
    <script type="application/json" id="theme-manifest">{{ theme_manifest_json | safe }}</script>
    <script src="{{ asset_path_prefix }}assets/js/theme-switcher.js"></script>
</body>
</html>
